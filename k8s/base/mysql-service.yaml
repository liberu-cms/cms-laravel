apiVersion: v1
kind: Service
metadata:
  name: cms-mysql
  namespace: cms-laravel
  labels:
    app: liberu-cms
    component: mysql
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: liberu-cms
    component: mysql
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
    protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-queue-worker
  namespace: cms-laravel
  labels:
    app: liberu-cms
    component: queue-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liberu-cms
      component: queue-worker
  template:
    metadata:
      labels:
        app: liberu-cms
        component: queue-worker
    spec:
      terminationGracePeriodSeconds: 300
      containers:
      - name: queue-worker
        image: ghcr.io/liberusoftware/cms-laravel:latest
        command: ["php", "artisan", "horizon"]
        envFrom:
        - configMapRef:
            name: cms-config
        - secretRef:
            name: cms-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["php", "artisan", "horizon:status"]
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["php", "artisan", "horizon:status"]
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["php", "artisan", "horizon:terminate"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
      securityContext:
        fsGroup: 1000
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cms-scheduler
  namespace: cms-laravel
  labels:
    app: liberu-cms
    component: scheduler
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: liberu-cms
            component: scheduler
        spec:
          restartPolicy: OnFailure
          containers:
          - name: scheduler
            image: ghcr.io/liberusoftware/cms-laravel:latest
            command: ["php", "artisan", "schedule:run"]
            envFrom:
            - configMapRef:
                name: cms-config
            - secretRef:
                name: cms-secrets
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
          securityContext:
            fsGroup: 1000

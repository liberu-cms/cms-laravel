apiVersion: v1
kind: Service
metadata:
  name: cms-laravel
  namespace: cms-laravel
  labels:
    app: cms-laravel
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cms-laravel
    component: application

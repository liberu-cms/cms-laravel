apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-redis
  namespace: cms-laravel
  labels:
    app: cms-laravel
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-laravel
      component: redis
  template:
    metadata:
      labels:
        app: cms-laravel
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: [redis-cli, ping]
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cms-redis
  namespace: cms-laravel
  labels:
    app: cms-laravel
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: cms-laravel
    component: redis

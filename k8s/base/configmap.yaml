apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-config
  namespace: cms-laravel
  labels:
    app: cms-laravel
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"
  DB_CONNECTION: "mysql"
  DB_HOST: "cms-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "liberu_cms"
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  REDIS_HOST: "cms-redis"
  REDIS_PORT: "6379"
  OCTANE_SERVER: "roadrunner"
  BROADCAST_CONNECTION: "reverb"
  FILESYSTEM_DISK: "local"

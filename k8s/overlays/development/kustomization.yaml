apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: cms-dev

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: cms-laravel

configMapGenerator:
- name: cms-config
  behavior: merge
  literals:
  - APP_ENV=development
  - APP_DEBUG=true
  - LOG_LEVEL=debug

images:
- name: ghcr.io/liberusoftware/cms-laravel
  newTag: develop

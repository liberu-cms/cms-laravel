services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: liberu/cms
    container_name: cms_app
    restart: unless-stopped
    environment:
      CONTAINER_MODE: app
      OCTANE_SERVER: swoole
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-liberu}
      DB_USERNAME: ${DB_USERNAME:-liberu}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUNNING_MIGRATIONS_AND_SEEDERS: ${RUNNING_MIGRATIONS_AND_SEEDERS:-false}
    ports:
      - "${APP_PORT:-8000}:9000"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    image: liberu/cms
    container_name: cms_horizon
    restart: unless-stopped
    environment:
      CONTAINER_MODE: horizon
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-liberu}
      DB_USERNAME: ${DB_USERNAME:-liberu}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network

  mysql:
    image: mysql:8.0
    container_name: cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-liberu}
      MYSQL_USER: ${DB_USERNAME:-liberu}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 5s
    networks:
      - cms_network

volumes:
  app_storage:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  cms_network:
    driver: bridge
